<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Steph'Insight</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Playfair Display', serif;
background:#0b0b0b;
color:white;
text-align:center;
margin:0;
padding:0;
}

/* HEADER */

.header{
padding:120px 20px 60px 20px;
}

.photo{
width:180px;
border-radius:50%;
margin-top:25px;
box-shadow:0px 0px 35px rgba(255,255,255,0.15);
}

/* PHRASES SCROLL */

.spacer{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
padding:40px;
opacity:0.9;
}

/* REVELATION */

.reveal{
margin-top:100px;
}

iframe{
width:100%;
max-width:420px;
height:500px;
border:0;
}

/* INSTAGRAM SECTION */

.insta{
margin-top:80px;
padding-bottom:120px;
}

.insta p{
font-size:24px;
opacity:0.9;
}

/* BOUTON INSTAGRAM */

.insta-btn{
display:inline-block;
margin-top:25px;
padding:14px 34px;
font-size:18px;
text-decoration:none;
color:white;
border-radius:40px;
background:linear-gradient(45deg,#833AB4,#FD1D1D,#F77737);
box-shadow:0px 0px 20px rgba(253,29,29,0.5);
transition:0.3s;
}

.insta-btn:hover{
transform:scale(1.08);
box-shadow:0px 0px 35px rgba(253,29,29,0.8);
}

</style>

</head>

<body>

<div class="header">

<h1>Steph'Insight</h1>

<img src="steph.jpg" class="photo">

<p style="margin-top:25px; font-size:20px; opacity:0.8">
Magician • Mentalist • Barista
</p>

<p style="margin-top:20px; opacity:0.7">
Sometimes a simple coffee<br>
can lead to something impossible.
</p>

</div>


<div class="spacer">
You made your choices
</div>

<div class="spacer">
Everything felt random
</div>

<div class="spacer">
And yet...
</div>


<div class="reveal">

<iframe src="https://www.flitch.me/iframe.php?n=17726602048546" scrolling="yes"></iframe>

</div>


<div class="insta">

<p>
This was only the beginning.
</p>

<p style="opacity:0.7; margin-top:10px">
Want to see more impossible moments?
</p>

<a class="insta-btn" href="https://instagram.com/steph_superv" target="_blank">
Follow on Instagram
</a>

</div>


</body>
</html>
